name: Publish to npm (master branch)

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Find changed packages
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" || -z "$BEFORE" ]]; then
            # Initial push to branch — treat all packages as changed
            CHANGED=$(ls packages/ | sed 's|^|packages/|' | tr '\n' ' ')
          else
            git fetch --depth=2 origin master
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA" -- 'packages/' | awk -F/ '{print $2}' | sort -u | sed 's|^|packages/|' | tr '\n' ' ')
          fi
          echo "changed_packages=$CHANGED" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build changed packages
        if: steps.changed.outputs.changed_packages
        run: |
          for pkgdir in ${{ steps.changed.outputs.changed_packages }}; do
            npm run build --workspace $pkgdir
          done
        shell: bash

      - name: Publish changed packages to npm
        if: steps.changed.outputs.changed_packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkgdir in ${{ steps.changed.outputs.changed_packages }}; do
            if ! grep -q '"private"\s*:\s*true' $pkgdir/package.json; then
              npm publish --access public --workspace $pkgdir
            fi
          done
        shell: bash
